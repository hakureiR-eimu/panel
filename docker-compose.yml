services:
  # ========================
  # 前端 — 静态资源服务
  # ========================
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    restart: unless-stopped

  # ========================
  # 后端服务
  # ========================
  backend-blog:
    build: ./backend-blog
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend-quant:
    build: ./backend-quant
    ports:
      - "8001:8001"
    restart: unless-stopped

  backend-embedding:
    build: ./backend-embedding
    ports:
      - "8002:8002"
    restart: unless-stopped

  # ========================
  # Nginx 反向代理 — 统一入口
  # ========================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend-blog
      - backend-quant
      - backend-embedding
    restart: unless-stopped
