services:
  # ========================
  # Nginx 反向代理 — 统一入口
  # ========================
  nginx:
    image: nginx:stable
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/static:ro
    restart: unless-stopped
