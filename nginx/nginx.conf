events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    keepalive_timeout 65;

    # 上游服务定义
    upstream frontend {
        server frontend:3000;
    }

    upstream backend_blog {
        server backend-blog:8000;
    }

    upstream backend_quant {
        server backend-quant:8001;
    }

    upstream backend_embedding {
        server backend-embedding:8002;
    }

    server {
        listen 80;
        server_name localhost;

        # 前端静态资源（默认路由）
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 博客后端 API
        location /api/blog/ {
            proxy_pass http://backend_blog/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 量化面板后端 API
        location /api/quant/ {
            proxy_pass http://backend_quant/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 代码语义向量化搜索 API
        location /api/embedding/ {
            proxy_pass http://backend_embedding/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
